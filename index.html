<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ON1X VPN — Админ-панель</title>
    <style>
        :root {
            --bg-main: #0b0f17;
            --card-bg: #1e293b;
            --card-border: #000000;
            --shadow-color: #000000;
            --text-title: #ffffff;
            --text-body: #f8fafc;
            --text-sub: #94a3b8;
            
            --btn-primary-bg: #ccff00;
            --btn-primary-text: #000000;
            --btn-secondary-bg: #0f172a;
            --btn-secondary-border: #000000;
            
            --slider-bg: #1e293b;
            --slider-thumb: #ccff00;
            --icon-color: #ffffff;
            
            --star-filled: #ccff00;
            --star-empty: transparent;
            --input-bg: #0f172a;
            --admin-red: #ff4d4d;
            --success-green: #2ecc71;
            --pending-orange: #ffa500;
        }

        [data-theme="light"] {
            --bg-main: #f1f5f9;
            --card-bg: #ffffff;
            --card-border: #000000;
            --shadow-color: #000000;
            --text-title: #000000;
            --text-body: #0f172a;
            --text-sub: #64748b;
            
            --btn-primary-bg: #000000;
            --btn-primary-text: #ffffff;
            --btn-secondary-bg: #f8fafc;
            --btn-secondary-border: #000000;
            --slider-bg: #ffffff;
            --slider-thumb: #000000;
            --icon-color: #000000;
            
            --star-filled: #000000;
            --star-empty: transparent;
            --input-bg: #f8fafc;
            --admin-red: #d32f2f;
            --success-green: #27ae60;
            --pending-orange: #e67e22;
        }

        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            background-color: var(--bg-main);
            color: var(--text-body);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 24px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            transition: background 0.3s ease;
        }

        input, textarea, select {
            user-select: text !important;
            -webkit-user-select: text !important;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .theme-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin-bottom: 40px;
        }

        .theme-switch {
            position: relative;
            width: 76px;
            height: 38px;
            background: var(--slider-bg);
            border: 2px solid var(--card-border);
            border-radius: 0px; 
            box-shadow: 3px 3px 0px var(--shadow-color);
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background 0.3s ease;
        }

        .theme-checkbox { display: none; }

        .switch-icon {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: var(--icon-color);
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            z-index: 1;
            transition: stroke 0.3s ease;
            margin: 0 4px;
        }

        .theme-handle {
            position: absolute;
            left: 4px;
            width: 26px;
            height: 26px;
            background-color: var(--slider-thumb);
            border: 2px solid var(--card-border);
            transition: transform 0.2s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            z-index: 2;
        }

        .theme-checkbox:checked + .theme-switch .theme-handle {
            transform: translateX(38px);
        }

        .container {
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        /* Окно авторизации */
        .auth-box {
            background: var(--card-bg);
            border: 3px solid var(--card-border);
            padding: 24px 16px;
            box-shadow: 8px 8px 0px var(--shadow-color);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .brand-header { text-align: center; }

        .brand-title {
            font-size: 36px;
            font-weight: 900;
            letter-spacing: -1px;
            color: var(--text-title);
            text-transform: uppercase;
            -webkit-text-stroke: 1px var(--card-border);
        }

        .brand-slogan {
            display: inline-block;
            font-size: 12px;
            background: var(--admin-red);
            color: #ffffff;
            border: 2px solid var(--card-border);
            padding: 2px 8px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 6px;
            box-shadow: 2px 2px 0px var(--shadow-color);
        }

        /* Блок статистики */
        .stats-box {
            background: var(--card-bg);
            border: 3px solid var(--card-border);
            padding: 12px;
            box-shadow: 4px 4px 0px var(--shadow-color);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            text-align: center;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 900;
        }
        .stat-value.published { color: var(--success-green); }
        .stat-value.pending { color: var(--pending-orange); }

        .filter-box {
            background: var(--card-bg);
            border: 3px solid var(--card-border);
            padding: 14px;
            box-shadow: 4px 4px 0px var(--shadow-color);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .filter-label {
            display: block;
            margin-bottom: 6px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            color: var(--text-sub);
            letter-spacing: 0.5px;
        }

        select, input[type="text"].search-input, input[type="email"], input[type="password"], input[type="datetime-local"] {
            width: 100%;
            background: var(--input-bg);
            border: 2px solid var(--card-border);
            padding: 10px;
            color: var(--text-body);
            font-weight: 700;
            outline: none;
            font-size: 14px;
            border-radius: 0px;
        }

        select, input[type="datetime-local"] { cursor: pointer; }

        .reviews-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .section-box {
            background: var(--card-bg);
            border: 3px solid var(--card-border);
            padding: 12px;
            box-shadow: 4px 4px 0px var(--shadow-color);
            display: flex;
            flex-direction: column;
            position: relative;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .section-box:active {
            transform: translate(1px, 1px);
            box-shadow: 3px 3px 0px var(--shadow-color);
        }

        .card-header-clickable {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 24px;
        }

        /* Модальное окно редактирования */
        .edit-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(11, 15, 23, 0.88);
            display: none;
            justify-content: center;
            align-items: flex-start;
            z-index: 1000;
            padding: 24px;
            overflow-y: auto;
        }

        .edit-modal-overlay.active {
            display: flex;
        }

        .edit-modal {
            background: var(--card-bg);
            width: 100%;
            max-width: 340px;
            padding: 24px;
            border: 3px solid var(--card-border);
            position: relative;
            box-shadow: 8px 8px 0px var(--shadow-color);
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: auto;
        }

        .edit-modal-close {
            position: absolute;
            top: 12px;
            right: 16px;
            font-size: 28px;
            font-weight: 900;
            color: var(--text-sub);
            cursor: pointer;
            line-height: 1;
            background: none;
            border: none;
        }

        .edit-modal-title {
            font-size: 13px;
            font-weight: 900;
            text-transform: uppercase;
            color: var(--text-title);
            margin-bottom: 4px;
            padding-right: 24px;
        }

        .btn-tg {
            background: #0088cc;
            color: #ffffff;
        }

        .status-badge {
            align-self: flex-start;
            font-size: 9px;
            font-weight: 900;
            text-transform: uppercase;
            padding: 2px 8px;
            border: 2px solid var(--card-border);
            box-shadow: 2px 2px 0px var(--shadow-color);
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }
        .status-0 { background: var(--pending-orange); color: #000; }
        .status-1 { background: var(--success-green); color: #fff; }
        .status-2 { background: var(--text-sub); color: #000; }

        .stars-row { display: flex; gap: 4px; align-items: center; }
        
        /* Интерактивный ряд звезд для редактирования */
        .stars-edit-row {
            display: flex;
            gap: 8px;
            margin-bottom: 4px;
        }
        
        .star-btn {
            background: var(--input-bg);
            border: 2px solid var(--card-border);
            padding: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 2px 0px var(--shadow-color);
            transition: transform 0.05s ease;
        }
        .star-btn:active {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0px var(--shadow-color);
        }

        .brutal-star { width: 18px; height: 18px; pointer-events: none; }
        .brutal-star path { stroke: #000000; stroke-width: 2.5px; stroke-linejoin: miter; }
        .brutal-star.filled path { fill: var(--star-filled); }
        .brutal-star.empty path { fill: var(--star-empty); }

        .user-meta { display: flex; align-items: center; gap: 10px; }
        .avatar {
            width: 28px;
            height: 28px;
            background: var(--btn-primary-bg);
            border: 2px solid var(--card-border);
            color: var(--btn-primary-text);
            display: grid;
            place-items: center;
            font-weight: 900;
            font-size: 12px;
        }

        .username { display: flex; flex-direction: column; font-weight: 800; font-size: 13px; color: var(--text-title); }
        .review-date { font-size: 10px; color: var(--text-sub); font-weight: 500; }

        textarea, input[type="text"], input[type="number"] {
            width: 100%;
            background: var(--input-bg);
            border: 2px solid var(--card-border);
            padding: 10px;
            color: var(--text-body);
            outline: none;
            font-size: 13px;
            border-radius: 0px;
            font-family: inherit;
        }
        
        textarea:focus, input[type="text"]:focus, input[type="number"]:focus, input[type="email"]:focus, input[type="password"]:focus, input[type="datetime-local"]:focus, select:focus {
            border-color: var(--btn-primary-bg);
        }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 12px;
            font-size: 12px;
            font-weight: 800;
            border: 2px solid var(--card-border);
            box-shadow: 3px 3px 0px var(--shadow-color);
            cursor: pointer;
            text-transform: uppercase;
        }
        .btn:active { transform: translate(1px, 1px); box-shadow: 2px 2px 0px var(--shadow-color); }
        .btn-save { background: var(--btn-primary-bg); color: var(--btn-primary-text); }
        .btn-delete { background: var(--admin-red); color: #fff; }
        .btn-full { grid-column: span 2; background: var(--btn-primary-bg); color: var(--btn-primary-text); }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 24px;
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            border: 3px solid #000;
            z-index: 9999;
            display: none;
            box-shadow: 4px 4px 0px var(--shadow-color);
            text-align: center;
        }
        .toast.show { display: block; }
        .toast.error { background: var(--admin-red); color: #fff; }
        .toast.success { background: var(--success-green); color: #fff; }
        
        .hidden { display: none !important; }

        .source-badge {
            display: inline-block;
            font-size: 9px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 2px 8px;
            border: 2px solid var(--card-border);
            box-shadow: 2px 2px 0px var(--shadow-color);
            align-self: flex-start;
        }

        .source-badge.telegram {
            background: #0088cc;
            color: #ffffff;
        }

        .source-badge.website {
            background: var(--btn-primary-bg);
            color: var(--btn-primary-text);
        }

        .tg-id-field {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--input-bg);
            border: 2px solid var(--card-border);
            padding: 8px 10px;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-body);
            margin-bottom: 0;
        }

        .tg-id-label {
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            color: var(--text-sub);
            white-space: nowrap;
        }

        .tg-id-value {
            font-size: 13px;
            font-weight: 800;
            color: #0088cc;
            word-break: break-all;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="theme-container">
        <input type="checkbox" id="themeInput" class="theme-checkbox">
        <label for="themeInput" class="theme-switch">
            <svg class="switch-icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            <div class="theme-handle"></div>
            <svg class="switch-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        </label>
    </div>

    <div id="toast" class="toast"></div>

    <div class="container" id="authContainer">
        <header class="brand-header">
            <h1 class="brand-title">ON1X Auth</h1>
            <p class="brand-slogan">Вход в панель</p>
        </header>
        <div class="auth-box">
            <div>
                <span class="filter-label">Email:</span>
                <input type="email" id="authEmail" placeholder="admin@on1x.vpn">
            </div>
            <div>
                <span class="filter-label">Пароль:</span>
                <input type="password" id="authPassword" placeholder="••••••••">
            </div>
            <button class="btn btn-full" onclick="handleLogin()">Войти</button>
        </div>
    </div>

    <div class="container hidden" id="adminContainer">
        <header class="brand-header">
            <h1 class="brand-title">ON1X Admin</h1>
            <div style="display: flex; justify-content: center; gap: 8px; align-items: center;">
                <p class="brand-slogan">Модерация</p>
                <button class="btn" style="padding: 2px 6px; font-size: 10px; margin-top:6px; box-shadow: 2px 2px 0px var(--shadow-color);" onclick="handleLogout()">Выйти</button>
            </div>
        </header>

        <div class="stats-box">
            <div class="stat-item">
                <span class="filter-label" style="margin-bottom:0;">Опубликовано</span>
                <span class="stat-value published" id="statPublished">0</span>
            </div>
            <div class="stat-item">
                <span class="filter-label" style="margin-bottom:0;">На проверке</span>
                <span class="stat-value pending" id="statPending">0</span>
            </div>
        </div>

        <div class="filter-box">
            <div>
                <span class="filter-label">Фильтр по статусу</span>
                <select id="statusFilter">
                    <option value="all">Все отзывы</option>
                    <option value="0">0 — Ожидает проверки</option>
                    <option value="1">1 — Опубликован (Учитывается)</option>
                    <option value="2">2 — Опубликован (НЕ учитывается)</option>
                </select>
            </div>
            <div>
                <span class="filter-label">Поиск</span>
                <input type="text" id="searchInput" class="search-input" placeholder="Имя автора или текст...">
            </div>
        </div>

        <div class="reviews-grid" id="grid"></div>
    </div>

    <div class="edit-modal-overlay" id="editModalOverlay">
        <div class="edit-modal" id="editModal">
            <button class="edit-modal-close" id="editModalClose">&times;</button>
            <div class="edit-modal-title" id="editModalTitle">Редактирование отзыва</div>
            <div id="editModalContent"></div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://yvnnngfzzjdbeiscwluy.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2bm5uZ2Z6empkYmVpc2N3bHV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NzY2ODYsImV4cCI6MjA5MDA1MjY4Nn0.SesGG2QhbJKfAklZDiL8oolWQ6qaTtBwRL_tvigpd9A';
        
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY, {
            auth: {
                persistSession: true,
                autoRefreshToken: true
            }
        });

        const authContainer = document.getElementById('authContainer');
        const adminContainer = document.getElementById('adminContainer');
        const grid = document.getElementById('grid');
        const toast = document.getElementById('toast');
        const statusFilter = document.getElementById('statusFilter');
        const searchInput = document.getElementById('searchInput');
        
        const statPublished = document.getElementById('statPublished');
        const statPending = document.getElementById('statPending');
        
        let allReviews = [];
        // Временный объект для отслеживания текущих выбранных звезд в открытых карточках до их сохранения
        let activeStarsEditing = {};

        const themeInput = document.getElementById('themeInput');
        const savedTheme = localStorage.getItem('theme') || 'dark';
        if (savedTheme === 'light') { document.documentElement.setAttribute('data-theme', 'light'); themeInput.checked = true; }
        themeInput.addEventListener('change', () => {
            const currentTheme = themeInput.checked ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', currentTheme);
            localStorage.setItem('theme', currentTheme);
        });

        function showNotification(text, type) {
            toast.textContent = text;
            toast.className = `toast show ${type}`;
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                showAdminPanel();
            } else {
                showAuthForm();
            }
        }

        function showAdminPanel() {
            authContainer.classList.add('hidden');
            adminContainer.classList.remove('hidden');
            fetchAllReviews();
        }

        function showAuthForm() {
            adminContainer.classList.add('hidden');
            authContainer.classList.remove('hidden');
        }

        async function handleLogin() {
            const email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value;

            if (!email || !password) { showNotification("Заполните поля!", "error"); return; }

            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

            if (error) {
                console.error("ОШИБКА АВТОРИЗАЦИИ:", error);
                showNotification("Неверный логин или пароль", "error");
            } else {
                showNotification("Успешный вход!", "success");
                showAdminPanel();
            }
        }

        async function handleLogout() {
            await supabaseClient.auth.signOut();
            showAuthForm();
        }

        function getStarSvg(isFilled) {
            return `<svg class="brutal-star ${isFilled ? 'filled' : 'empty'}" viewBox="0 0 24 24"><path d="M12 1.7l3.09 6.26L22 8.9l-5 4.87L18.18 22 12 18.75 5.82 22 7 13.77 2 8.9l6.91-.94L12 1.7z"/></svg>`;
        }

        function getStarsRowHtml(starsCount) {
            let html = '';
            for (let i = 1; i <= 5; i++) html += getStarSvg(i <= starsCount);
            return html;
        }

        // Генерация кнопок-звёзд для редактирования внутри раскрытой карточки
        function getStarsEditButtons(reviewId, currentStars) {
            let html = `<div class="stars-edit-row" id="stars-container-${reviewId}">`;
            for (let i = 1; i <= 5; i++) {
                html += `
                <button class="star-btn" onclick="setStarsEditing('${reviewId}', ${i})">
                    ${getStarSvg(i <= currentStars)}
                </button>`;
            }
            html += `</div>`;
            return html;
        }

        // Функция изменения звезд при клике на кнопки (без перезагрузки списка)
        function setStarsEditing(reviewId, starsCount) {
            activeStarsEditing[reviewId] = starsCount;
            const container = document.getElementById(`stars-container-${reviewId}`);
            if (container) {
                let buttonsHtml = '';
                for (let i = 1; i <= 5; i++) {
                    buttonsHtml += `
                    <button class="star-btn" onclick="setStarsEditing('${reviewId}', ${i})">
                        ${getStarSvg(i <= starsCount)}
                    </button>`;
                }
                container.innerHTML = buttonsHtml;
            }
        }

        function updateStatsCounters() {
            const countPublished = allReviews.filter(r => r.proverka === 1 || r.proverka === 2).length;
            const countPending = allReviews.filter(r => r.proverka === 0).length;
            
            statPublished.textContent = countPublished;
            statPending.textContent = countPending;
        }

        async function fetchAllReviews() {
            try {
                let { data: reviews, error } = await supabaseClient
                    .from('reviews')
                    .select('id, name, contact, msg, stars, created_at, admin, proverka, source')
                    .order('created_at', { ascending: false });
                if (!error && reviews) {
                    allReviews = reviews;
                    updateStatsCounters();
                    renderFiltered();
                } else if (error && error.status === 401) {
                    handleLogout();
                }
            } catch (e) {
                showNotification("Ошибка загрузки данных", "error");
            }
        }

        const editModalOverlay = document.getElementById('editModalOverlay');
        const editModalClose = document.getElementById('editModalClose');
        const editModalTitle = document.getElementById('editModalTitle');
        const editModalContent = document.getElementById('editModalContent');

        editModalClose.addEventListener('pointerdown', closeEditModal);
        editModalOverlay.addEventListener('pointerdown', (e) => { if (e.target === editModalOverlay) closeEditModal(); });

        function openEditModal(r) {
            const dateObj = new Date(r.created_at);
            const tzOffset = dateObj.getTimezoneOffset() * 60000;
            const localISODate = (new Date(dateObj.getTime() - tzOffset)).toISOString().slice(0, 16);

            if (activeStarsEditing[r.id] === undefined) {
                activeStarsEditing[r.id] = r.stars;
            }

            editModalTitle.textContent = `Отзыв — ${r.name || 'Аноним'}`;

            editModalContent.innerHTML = `
                <span class="filter-label">Дата написания отзыва:</span>
                <input type="datetime-local" id="date-${r.id}" value="${localISODate}" style="margin-bottom:4px;">

                <span class="filter-label">Источник публикации:</span>
                <div class="tg-id-field" style="margin-bottom:0;">
                    <span class="tg-id-value">${r.source === 'telegram' ? '📱 Telegram' : r.source === 'website' ? '🌐 Сайт' : '— не указан'}</span>
                </div>

                ${r.contact ? `
                <span class="filter-label" style="margin-top:6px;">Telegram ID пользователя:</span>
                <div class="tg-id-field">
                    <span class="tg-id-label">ID:</span>
                    <span class="tg-id-value" style="user-select:text !important; -webkit-user-select:text !important;">${r.contact}</span>
                </div>
                <button class="btn btn-tg" onclick="window.open('https://t.me/on1xVPN_bot?start=user_${r.contact}', '_blank')" style="margin-bottom:0;">ОТКРЫТЬ В БОТЕ</button>
                ` : `
                <span class="filter-label" style="margin-top:6px;">Telegram ID пользователя:</span>
                <div class="tg-id-field">
                    <span class="tg-id-value" style="color:var(--text-sub);">— не указан</span>
                </div>`}

                <span class="filter-label" style="margin-top:6px;">Количество звёзд (оценка):</span>
                ${getStarsEditButtons(r.id, activeStarsEditing[r.id])}

                <span class="filter-label">Текст отзыва:</span>
                <textarea id="msg-${r.id}" rows="3">${r.msg || ''}</textarea>
                
                <span class="filter-label">Комментарий администратора (admin):</span>
                <textarea id="admin-${r.id}" rows="2" placeholder="Ваш ответ под отзывом...">${r.admin || ''}</textarea>
                
                <span class="filter-label">Статус (proverka):</span>
                <select id="proverka-${r.id}" style="margin-bottom:12px;">
                    <option value="0" ${r.proverka === 0 ? 'selected' : ''}>Не опубликован</option>
                    <option value="1" ${r.proverka === 1 ? 'selected' : ''}>Опубликован</option>
                    <option value="2" ${r.proverka === 2 ? 'selected' : ''}>Опубликован (Оценка НЕ учитывается)</option>
                </select>

                <div class="btn-group">
                    <button class="btn btn-save" onclick="updateReview('${r.id}')">Сохранить</button>
                    <button class="btn btn-delete" onclick="deleteReview('${r.id}')">Удалить</button>
                </div>
            `;

            editModalOverlay.classList.add('active');
        }

        function closeEditModal() {
            editModalOverlay.classList.remove('active');
            editModalContent.innerHTML = '';
        }

        function renderFiltered() {
            const filterValue = statusFilter.value;
            const query = searchInput.value.trim().toLowerCase();

            let filteredData = filterValue === 'all' 
                ? allReviews 
                : allReviews.filter(r => r.proverka.toString() === filterValue);

            if (query) {
                filteredData = filteredData.filter(r => {
                    const nameMatch = r.name ? r.name.toLowerCase().includes(query) : false;
                    const msgMatch = r.msg ? r.msg.toLowerCase().includes(query) : false;
                    return nameMatch || msgMatch;
                });
            }

            const statusLabels = { 0: 'Проверка', 1: 'Опубликован', 2: 'Опубликован (Оценка НЕ учитывается)' };

            if (filteredData.length === 0) {
                grid.innerHTML = `<div style="text-align:center; padding:20px; font-weight:800; color:var(--text-sub); text-transform:uppercase; font-size:13px;">Ничего не найдено</div>`;
                return;
            }

            grid.innerHTML = filteredData.map((r) => {
                const dateObj = new Date(r.created_at);
                const displayDate = `${String(dateObj.getDate()).padStart(2, '0')}.${String(dateObj.getMonth() + 1).padStart(2, '0')}.${dateObj.getFullYear()}`;

                return `
                <div class="section-box" id="card-${r.id}" onclick="openEditModal(${JSON.stringify(r).replace(/"/g, '&quot;')})">
                    <div class="card-header-clickable">
                        <div style="display: flex; gap: 6px; align-items: center; flex-wrap: wrap;">
                            <span class="status-badge status-${r.proverka}">${statusLabels[r.proverka] || r.proverka}</span>
                            ${r.source ? `<span class="source-badge ${r.source === 'telegram' ? 'telegram' : 'website'}">${r.source === 'telegram' ? 'Telegram' : 'Сайт'}</span>` : ''}
                        </div>
                        <div class="user-meta">
                            <div class="avatar">${r.name ? r.name[0].toUpperCase() : '?'}</div>
                            <div class="username">
                                <span>${r.name || 'Аноним'} ${r.contact ? `<span style="color:var(--text-sub); font-size:10px; font-weight:500;">(${r.contact})</span>` : ''}</span>
                                <span class="review-date">${displayDate}</span>
                            </div>
                        </div>
                        <div class="stars-row">${getStarsRowHtml(r.stars)}</div>
                    </div>
                </div>`;
            }).join('');
        }

        statusFilter.addEventListener('change', renderFiltered);
        searchInput.addEventListener('input', renderFiltered);

        async function updateReview(id) {
            // Берем количество звезд из сохраненного локального состояния кнопок
            const stars = activeStarsEditing[id] || 5;
            const msg = document.getElementById(`msg-${id}`).value.trim();
            const admin = document.getElementById(`admin-${id}`).value.trim();
            const proverka = parseInt(document.getElementById(`proverka-${id}`).value);
            const inputDate = document.getElementById(`date-${id}`).value;

            if (!msg) { showNotification("Поле отзыва не должно быть пустым", "error"); return; }
            if (!inputDate) { showNotification("Выберите корректную дату", "error"); return; }

            const isoDate = new Date(inputDate).toISOString();

            const { error } = await supabaseClient
                .from('reviews')
                .update({ 
                    stars: stars > 5 ? 5 : (stars < 1 ? 1 : stars), 
                    msg, 
                    admin: admin || null, 
                    proverka,
                    created_at: isoDate
                })
                .eq('id', id);

            if (!error) {
                showNotification("Сохранено успешно!", "success");
                delete activeStarsEditing[id]; // Очищаем временное состояние для этой карточки
                closeEditModal();
                fetchAllReviews(); 
            } else {
                showNotification("Ошибка RLS или сервера Supabase", "error");
            }
        }

        async function deleteReview(id) {
            if (!confirm("Вы уверены, что хотите навсегда удалить этот отзыв из базы данных?")) return;

            const { error } = await supabaseClient
                .from('reviews')
                .delete()
                .eq('id', id);

            if (!error) {
                showNotification("Запись удалена!", "success");
                delete activeStarsEditing[id];
                closeEditModal();
                fetchAllReviews();
            } else {
                showNotification("Ошибка удаления", "error");
            }
        }

        checkSession();
    </script>
</body>
</html>
